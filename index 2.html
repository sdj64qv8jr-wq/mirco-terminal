<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$MIRCO — AI ANALYSIS TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--g:#00ff88;--r:#ff4488;--y:#ffcc00;--bg:#000;--card:#030b03}
html,body{background:var(--bg);color:var(--g);font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;overflow-x:hidden}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes glow{0%,100%{text-shadow:0 0 6px var(--g)}50%{text-shadow:0 0 20px var(--g),0 0 40px rgba(0,255,136,.3)}}
@keyframes dotPulse{0%,100%{box-shadow:0 0 6px var(--g)}50%{box-shadow:0 0 20px var(--g),0 0 36px rgba(0,255,136,.5)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeSlide{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#000}::-webkit-scrollbar-thumb{background:rgba(0,255,136,.2);border-radius:2px}
#terminal{width:100%;max-width:580px;background:var(--card);border:1px solid rgba(0,255,136,.15);border-radius:14px;box-shadow:0 0 60px rgba(0,255,136,.07),0 0 140px rgba(0,255,136,.03),inset 0 0 100px rgba(0,0,0,.6);overflow:hidden;position:relative}
#scanline{position:absolute;left:0;right:0;height:28%;background:linear-gradient(transparent,rgba(0,255,136,.012),transparent);pointer-events:none;z-index:20;transition:top .04s linear}
#crt{position:absolute;inset:0;z-index:19;pointer-events:none;border-radius:14px;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px)}
#titlebar{padding:11px 18px;background:rgba(0,0,0,.9);border-bottom:1px solid rgba(0,255,136,.1);display:flex;align-items:center;gap:10px}
#dot{width:9px;height:9px;border-radius:50%;background:var(--g);flex-shrink:0;animation:dotPulse 2s infinite}
#title-text{font-size:11px;letter-spacing:3px;flex:1;animation:glow 3s infinite;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#clock{font-size:10px;color:rgba(0,255,136,.35);flex-shrink:0}
#statusbar{padding:5px 18px;background:rgba(0,0,0,.8);border-bottom:1px solid rgba(0,255,136,.07);display:flex;align-items:center;gap:8px;min-height:26px}
#spinner{width:7px;height:7px;border:1px solid rgba(0,255,136,.2);border-top-color:var(--g);border-radius:50%;display:none;flex-shrink:0;animation:spin .65s linear infinite}
#status-text{font-size:9px;letter-spacing:2px}
#pricebar{padding:14px 18px;border-bottom:1px solid rgba(0,255,136,.08);display:flex;align-items:center;gap:14px;background:rgba(0,0,0,.5)}
#price-section{flex-shrink:0;min-width:110px}
#price-ticker{font-size:9px;color:rgba(0,255,136,.35);letter-spacing:4px;margin-bottom:4px}
#price-val{font-size:24px;letter-spacing:1px;font-weight:700;animation:glow 2.5s infinite}
#price-chg{font-size:11px;margin-top:3px}
#price-meta{font-size:9px;color:rgba(0,255,136,.3);margin-top:4px;letter-spacing:1px}
#chart-section{flex:1;min-width:0}
#verdict{flex-shrink:0;padding:10px 14px;border-radius:8px;font-size:15px;font-weight:700;letter-spacing:4px;display:none;animation:glow 1.5s infinite;font-family:'Orbitron',monospace}
#logbox{height:340px;overflow-y:auto;padding:14px 18px;background:rgba(0,0,0,.75)}
.line{font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-all;animation:fadeSlide .12s ease}
#cursor{color:var(--g);font-size:14px;animation:blink .8s step-end infinite}
#footer{padding:8px 18px;border-top:1px solid rgba(0,255,136,.07);background:rgba(0,0,0,.9);display:flex;justify-content:space-between;align-items:center}
.footer-txt{font-size:9px;color:rgba(0,255,136,.2);letter-spacing:1px}
#buybtn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,rgba(0,255,136,.12),rgba(0,255,136,.06));border:none;border-top:1px solid rgba(0,255,136,.15);color:var(--g);font-family:'Orbitron',monospace;font-size:13px;letter-spacing:4px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;transition:all .2s}
#buybtn:hover{background:rgba(0,255,136,.18);letter-spacing:6px}
</style>
</head>
<body>
<div id="terminal">
  <div id="scanline"></div><div id="crt"></div>
  <div id="titlebar">
    <div id="dot"></div>
    <div id="title-text">MIRCO / AI ANALYSIS TERMINAL v2.5</div>
    <div id="clock">--:--:--</div>
  </div>
  <div id="statusbar">
    <div id="spinner"></div>
    <div id="status-text" style="color:rgba(0,255,136,.4)">INITIALIZING...</div>
  </div>
  <div id="pricebar">
    <div id="price-section">
      <div id="price-ticker">$MIRCO / USD</div>
      <div id="price-val" style="color:var(--g)">$---</div>
      <div id="price-chg" style="color:var(--g)">---</div>
      <div id="price-meta">VOL: ---</div>
    </div>
    <div id="chart-section">
      <canvas id="chart" height="80" style="width:100%;display:block;"></canvas>
    </div>
    <div id="verdict"></div>
  </div>
  <div id="logbox">
    <div class="line" style="color:rgba(0,255,136,.4)">BOOT SEQUENCE STARTED...</div>
    <span id="cursor">█</span>
  </div>
  <div id="footer">
    <div class="footer-txt">CA: HGNjaczVcV6tKbpWCLa...</div>
    <div class="footer-txt" id="footer-next">NEXT FETCH: --s</div>
  </div>
  <a id="buybtn" href="https://pump.fun/coin/HGNjaczVcV6tKbpWCLarszbwtwB9hUd2Cd7ySbabpump" target="_blank" rel="noopener">🚀 BUY $MIRCO ON PUMP.FUN</a>
</div>

<script>
'use strict';
var CA='HGNjaczVcV6tKbpWCLarszbwtwB9hUd2Cd7ySbabpump';
var FETCH_INTERVAL=20000;
var IND_NAMES=['SMA_CROSS','RSI_14','BOLL_BAND','VOL_IDX','MOMENTUM_24H'];
var price=0,change24h=0,volume24h=0,mcap=0,liq=0,pairName='MIRCO/SOL';
var history=[],lastFetch=0,cycleCount=0,analysisRunning=false,pendingTimers=[];

var elClock=document.getElementById('clock');
var elSpinner=document.getElementById('spinner');
var elStatus=document.getElementById('status-text');
var elPriceVal=document.getElementById('price-val');
var elPriceChg=document.getElementById('price-chg');
var elPriceMet=document.getElementById('price-meta');
var elVerdict=document.getElementById('verdict');
var elLogbox=document.getElementById('logbox');
var elNext=document.getElementById('footer-next');
var canvas=document.getElementById('chart');
var scanEl=document.getElementById('scanline');

function withTimeout(p,ms){
  return new Promise(function(res,rej){
    var t=setTimeout(function(){rej(new Error('timeout'));},ms);
    p.then(function(v){clearTimeout(t);res(v);},function(e){clearTimeout(t);rej(e);});
  });
}

function parsePairs(json){
  if(json&&json.pairs&&json.pairs.length>0)return json.pairs;
  if(json&&json.pair)return[json.pair];
  return null;
}

// 4つのソースを順番に試す
var SOURCES=[
  {name:'DEX-TOKENS',  fn:function(){return withTimeout(fetch('https://api.dexscreener.com/latest/dex/tokens/'+CA).then(function(r){return r.json();}),7000);}},
  {name:'DEX-SEARCH',  fn:function(){return withTimeout(fetch('https://api.dexscreener.com/latest/dex/search?q='+CA).then(function(r){return r.json();}),7000);}},
  {name:'CORSPROXY',   fn:function(){return withTimeout(fetch('https://corsproxy.io/?'+encodeURIComponent('https://api.dexscreener.com/latest/dex/tokens/'+CA)).then(function(r){return r.json();}),8000);}},
  {name:'ALLORIGINS',  fn:function(){return withTimeout(fetch('https://api.allorigins.win/get?url='+encodeURIComponent('https://api.dexscreener.com/latest/dex/tokens/'+CA)).then(function(r){return r.json();}).then(function(d){return JSON.parse(d.contents);}),8000);}},
];

function fetchPrice(){
  elSpinner.style.display='block';
  setStatus('#ffcc00','CONNECTING...');
  var idx=0;
  function next(){
    if(idx>=SOURCES.length){
      elSpinner.style.display='none';
      setStatus('#ff4488','FETCH FAILED — RETRY IN 20s');
      appendLog('> all sources failed. retrying...','#ff4488',false);
      return Promise.resolve(false);
    }
    var src=SOURCES[idx++];
    setStatus('#ffcc00','TRYING '+src.name+' ('+idx+'/'+SOURCES.length+')...');
    return src.fn().then(function(json){
      var pairs=parsePairs(json);
      if(!pairs)throw new Error('empty');
      pairs.sort(function(a,b){return((b.liquidity&&b.liquidity.usd)||0)-((a.liquidity&&a.liquidity.usd)||0);});
      var pair=pairs[0];
      var np=parseFloat(pair.priceUsd)||0;
      if(np===0)throw new Error('price=0');
      change24h=parseFloat((pair.priceChange&&pair.priceChange.h24))||0;
      volume24h=(pair.volume&&pair.volume.h24)||0;
      mcap=pair.marketCap||pair.fdv||0;
      liq=(pair.liquidity&&pair.liquidity.usd)||0;
      pairName=((pair.baseToken&&pair.baseToken.symbol)||'MIRCO')+'/'+((pair.quoteToken&&pair.quoteToken.symbol)||'SOL');
      if(price===0&&np>0){
        var sp=np/(1+change24h/100); history=[];
        for(var i=0;i<60;i++){var t=i/59,b2=sp+(np-sp)*t;history.push(b2*(1+(Math.random()-.5)*.012));}
      }else if(np>0){history.push(np);if(history.length>120)history.shift();}
      price=np; lastFetch=Date.now();
      elSpinner.style.display='none';
      setStatus('#00ff88','LIVE · '+src.name+' · '+new Date().toLocaleTimeString('ja-JP'));
      updatePriceDisplay(); drawChart();
      return true;
    }).catch(function(e){
      appendLog('  '+src.name+' → '+e.message,'rgba(255,100,100,.5)',false);
      return next();
    });
  }
  return next();
}

function setStatus(c,m){elStatus.style.color=c;elStatus.textContent=m;}
function fmt(n){if(!n)return'0';if(n<0.000001)return n.toExponential(3);if(n<0.0001)return n.toFixed(10);if(n<0.001)return n.toFixed(8);if(n<1)return n.toFixed(6);return n.toFixed(4);}
function fmtBig(n){if(!n)return'N/A';if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(1)+'K';return'$'+n.toFixed(0);}
function sigColor(s){return s==='BUY'?'#00ff88':s==='SELL'?'#ff4488':'#ffcc00';}
function calcSMA(h,n){var s=h.slice(-n);return s.reduce(function(a,b){return a+b;},0)/s.length;}

function drawChart(){
  var ctx=canvas.getContext('2d'),W=canvas.offsetWidth||240;
  canvas.width=W;var H=80;ctx.clearRect(0,0,W,H);
  var hist=history.slice(-80);if(hist.length<2)return;
  var min=Math.min.apply(null,hist),max=Math.max.apply(null,hist),range=max-min||1;
  var up=change24h>=0,color=up?'#00ff88':'#ff4488';
  var pts=hist.map(function(v,i){return[(i/(hist.length-1))*W,H-((v-min)/range)*H*.82-H*.05];});
  var grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,up?'rgba(0,255,136,.2)':'rgba(255,68,136,.2)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.moveTo(pts[0][0],H);
  for(var i=0;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.lineTo(pts[pts.length-1][0],H);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.shadowColor=color;ctx.shadowBlur=6;ctx.stroke();
  var last=pts[pts.length-1];
  ctx.beginPath();ctx.arc(last[0],last[1],3.5,0,Math.PI*2);ctx.fillStyle=color;ctx.shadowBlur=14;ctx.fill();
}

function updatePriceDisplay(){
  var up=change24h>=0,color=up?'#00ff88':'#ff4488';
  elPriceVal.textContent='$'+fmt(price);elPriceVal.style.color=color;
  elPriceChg.textContent=(up?'▲ +':'▼ ')+change24h.toFixed(2)+'% (24H)';elPriceChg.style.color=color;
  elPriceMet.textContent='VOL: '+fmtBig(volume24h)+'   MC: '+fmtBig(mcap);
}

var INDICATORS=[
  function(p,h){var s10=calcSMA(h,10),s30=calcSMA(h,30);return s10>s30?{sig:'BUY',reason:'SMA10('+fmt(s10)+') > SMA30('+fmt(s30)+') → Golden cross',score:72}:{sig:'SELL',reason:'SMA10('+fmt(s10)+') < SMA30('+fmt(s30)+') → Death cross',score:35};},
  function(p,h){var gains=[],losses=[];for(var i=1;i<Math.min(15,h.length);i++){var d=h[h.length-i]-h[h.length-i-1];d>0?gains.push(d):losses.push(Math.abs(d));}var ag=gains.reduce(function(a,b){return a+b;},0)/(gains.length||1),al=losses.reduce(function(a,b){return a+b;},0)/(losses.length||1),r=al===0?100:100-100/(1+ag/al);if(r>70)return{sig:'SELL',reason:'RSI = '+r.toFixed(1)+' → Overbought zone',score:30};if(r<30)return{sig:'BUY',reason:'RSI = '+r.toFixed(1)+' → Oversold reversal',score:80};return{sig:'HOLD',reason:'RSI = '+r.toFixed(1)+' → Neutral momentum',score:55};},
  function(p,h){var sl=h.slice(-20),mean=sl.reduce(function(a,b){return a+b;},0)/sl.length,std=Math.sqrt(sl.reduce(function(a,b){return a+(b-mean)*(b-mean);},0)/sl.length),upper=mean+2*std,lower=mean-2*std;if(p>upper)return{sig:'SELL',reason:'Price above BB upper('+fmt(upper)+')',score:28};if(p<lower)return{sig:'BUY',reason:'Price below BB lower('+fmt(lower)+')',score:82};return{sig:'HOLD',reason:'BB: mid-band consolidation',score:52};},
  function(p,h){var vols=h.slice(-10).map(function(v,i,a){return i>0?Math.abs(v-a[i-1])/a[i-1]:0;}),vol=vols.reduce(function(a,b){return a+b;},0)/vols.length*100;if(vol>3)return{sig:'BUY',reason:'Volatility surge: '+vol.toFixed(2)+'% → breakout',score:68};return{sig:'HOLD',reason:'Low volatility: '+vol.toFixed(2)+'% → accumulation',score:54};},
  function(p,h){var c=change24h;if(c>20)return{sig:'BUY',reason:'24H: +'+c.toFixed(2)+'% → strong bull trend',score:78};if(c>5)return{sig:'BUY',reason:'24H: +'+c.toFixed(2)+'% → positive momentum',score:65};if(c<-20)return{sig:'SELL',reason:'24H: '+c.toFixed(2)+'% → heavy sell pressure',score:28};if(c<-5)return{sig:'SELL',reason:'24H: '+c.toFixed(2)+'% → bearish trend',score:38};return{sig:'HOLD',reason:'24H: '+c.toFixed(2)+'% → sideways range',score:50};}
];

function appendLog(text,color,dim){var line=document.createElement('div');line.className='line';line.textContent=text;line.style.color=dim?'rgba(0,255,136,.22)':(color||'#00ff88');elLogbox.insertBefore(line,document.getElementById('cursor'));elLogbox.scrollTop=elLogbox.scrollHeight;}
function clearLogs(){var c=document.getElementById('cursor');while(elLogbox.firstChild&&elLogbox.firstChild!==c)elLogbox.removeChild(elLogbox.firstChild);}

function runAnalysis(){
  if(analysisRunning||price===0||history.length<10)return;
  analysisRunning=true;pendingTimers.forEach(clearTimeout);pendingTimers=[];
  cycleCount++;clearLogs();elVerdict.style.display='none';
  var results=INDICATORS.map(function(fn){return fn(price,history);});
  var avgScore=results.reduce(function(a,b){return a+b.score;},0)/results.length;
  var buyV=results.filter(function(r){return r.sig==='BUY';}).length;
  var sellV=results.filter(function(r){return r.sig==='SELL';}).length;
  var holdV=results.filter(function(r){return r.sig==='HOLD';}).length;
  var final=buyV>=3?'BUY':sellV>=3?'SELL':'HOLD';
  var conf=Math.round(avgScore);
  var bar='';for(var b=0;b<Math.round(conf/10);b++)bar+='█';for(var b=0;b<10-Math.round(conf/10);b++)bar+='░';
  var now=new Date().toLocaleTimeString('ja-JP');
  var lines=[
    {t:0,s:'──────────────────────────────────────────',dim:true},
    {t:80,s:'['+now+'] CYCLE #'+('000'+cycleCount).slice(-4)+' INITIATED'},
    {t:220,s:'> SOURCE   : DEXSCREENER API'},
    {t:350,s:'> PAIR     : '+pairName},
    {t:470,s:'> PRICE    : $'+fmt(price)},
    {t:590,s:'> 24H CHG  : '+(change24h>=0?'+':'')+change24h.toFixed(2)+'%'},
    {t:710,s:'> VOLUME   : '+fmtBig(volume24h)},
    {t:830,s:'> MKT CAP  : '+fmtBig(mcap)},
    {t:950,s:'> LIQIDITY : '+fmtBig(liq)},
    {t:1070,s:'> SAMPLES  : '+history.length+' datapoints'},
    {t:1190,s:'──────────────────────────────────────────',dim:true},
    {t:1310,s:'[INDICATOR ENGINE v2.5] scanning...'},
  ];
  for(var i=0;i<results.length;i++){
    var base=1500+i*380,r=results[i];
    lines.push({t:base,s:'  ['+(i+1)+'/5] '+IND_NAMES[i]});
    lines.push({t:base+120,s:'       → '+r.reason});
    lines.push({t:base+220,s:'       → SIGNAL: '+r.sig+'  | SCORE: '+r.score+'/100',c:sigColor(r.sig)});
  }
  lines=lines.concat([
    {t:3500,s:'──────────────────────────────────────────',dim:true},
    {t:3650,s:'[CONSENSUS]  BUY:'+buyV+'  HOLD:'+holdV+'  SELL:'+sellV},
    {t:3800,s:'[CONFIDENCE] '+conf+'%  '+bar},
    {t:4000,s:'──────────────────────────────────────────',dim:true},
    {t:4150,s:'[AI VERDICT] >>> '+final+' <<<',c:sigColor(final),vv:final},
    {t:4300,s:final==='BUY'?'  Accumulation recommended. Upside momentum detected.':final==='SELL'?'  Risk elevated. Consider reducing exposure.':'  Await clearer signal. Monitor key levels.'},
    {t:4500,s:'[NEXT FETCH] T-'+(FETCH_INTERVAL/1000)+'s',dim:true},
  ]);
  for(var j=0;j<lines.length;j++){
    (function(item){
      var tid=setTimeout(function(){
        appendLog(item.s,item.c,item.dim);
        if(item.vv){var vc=sigColor(item.vv);elVerdict.textContent=item.vv;elVerdict.style.display='block';elVerdict.style.color=vc;elVerdict.style.border='1px solid '+vc;elVerdict.style.boxShadow='0 0 20px '+vc+'44';}
      },item.t);
      pendingTimers.push(tid);
    })(lines[j]);
  }
  setTimeout(function(){analysisRunning=false;},5000);
}

setInterval(function(){elClock.textContent=new Date().toLocaleTimeString('ja-JP');var nf=Math.max(0,Math.round((lastFetch+FETCH_INTERVAL-Date.now())/1000));elNext.textContent='NEXT FETCH: '+nf+'s';},1000);

var scanPos=0;
(function animScan(){scanPos=(scanPos+.35)%100;scanEl.style.top=scanPos+'%';requestAnimationFrame(animScan);})();

// Boot
fetchPrice().then(function(ok){
  if(ok){setTimeout(runAnalysis,800);}
  else{setTimeout(function(){fetchPrice().then(function(ok2){if(ok2)setTimeout(runAnalysis,800);});},10000);}
});
setInterval(function(){fetchPrice().then(function(ok){if(ok)setTimeout(runAnalysis,800);});},FETCH_INTERVAL);
</script>
</body>
</html>
