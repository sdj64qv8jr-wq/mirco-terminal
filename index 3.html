<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$MIRCO — AI TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#000;color:#00ff88;font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes glow{0%,100%{text-shadow:0 0 6px #00ff88}50%{text-shadow:0 0 20px #00ff88,0 0 40px rgba(0,255,136,.3)}}
@keyframes dotP{0%,100%{box-shadow:0 0 6px #00ff88}50%{box-shadow:0 0 20px #00ff88,0 0 36px rgba(0,255,136,.5)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fi{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#000}::-webkit-scrollbar-thumb{background:rgba(0,255,136,.2)}
#t{width:100%;max-width:580px;background:#030b03;border:1px solid rgba(0,255,136,.15);border-radius:14px;box-shadow:0 0 60px rgba(0,255,136,.07),inset 0 0 100px rgba(0,0,0,.6);overflow:hidden;position:relative}
#scan{position:absolute;left:0;right:0;height:28%;background:linear-gradient(transparent,rgba(0,255,136,.012),transparent);pointer-events:none;z-index:20}
#crt{position:absolute;inset:0;z-index:19;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px)}
#tb{padding:11px 18px;background:rgba(0,0,0,.9);border-bottom:1px solid rgba(0,255,136,.1);display:flex;align-items:center;gap:10px}
#dot{width:9px;height:9px;border-radius:50%;background:#00ff88;flex-shrink:0;animation:dotP 2s infinite}
#tt{font-size:11px;letter-spacing:3px;flex:1;animation:glow 3s infinite;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#ck{font-size:10px;color:rgba(0,255,136,.35);flex-shrink:0}
#sb{padding:5px 18px;background:rgba(0,0,0,.8);border-bottom:1px solid rgba(0,255,136,.07);display:flex;align-items:center;gap:8px;min-height:26px}
#sp{width:7px;height:7px;border:1px solid rgba(0,255,136,.2);border-top-color:#00ff88;border-radius:50%;display:none;flex-shrink:0;animation:spin .65s linear infinite}
#st{font-size:9px;letter-spacing:2px}
#pb{padding:14px 18px;border-bottom:1px solid rgba(0,255,136,.08);display:flex;align-items:center;gap:14px;background:rgba(0,0,0,.5)}
#ps{flex-shrink:0;min-width:110px}
#ptk{font-size:9px;color:rgba(0,255,136,.35);letter-spacing:4px;margin-bottom:4px}
#pv{font-size:24px;letter-spacing:1px;font-weight:700;animation:glow 2.5s infinite}
#pc{font-size:11px;margin-top:3px}
#pm{font-size:9px;color:rgba(0,255,136,.3);margin-top:4px}
#cs{flex:1;min-width:0}
#vd{flex-shrink:0;padding:10px 14px;border-radius:8px;font-size:15px;font-weight:700;letter-spacing:4px;display:none;animation:glow 1.5s infinite;font-family:'Orbitron',monospace}
#lb{height:360px;overflow-y:auto;padding:14px 18px;background:rgba(0,0,0,.75)}
.ln{font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-all;animation:fi .12s ease}
#cur{color:#00ff88;font-size:14px;animation:blink .8s step-end infinite}
#ft{padding:8px 18px;border-top:1px solid rgba(0,255,136,.07);background:rgba(0,0,0,.9);display:flex;justify-content:space-between}
.ft{font-size:9px;color:rgba(0,255,136,.2);letter-spacing:1px}
#bb{display:block;width:100%;padding:14px;background:linear-gradient(135deg,rgba(0,255,136,.12),rgba(0,255,136,.06));border:none;border-top:1px solid rgba(0,255,136,.15);color:#00ff88;font-family:'Orbitron',monospace;font-size:13px;letter-spacing:4px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;transition:all .2s}
#bb:hover{background:rgba(0,255,136,.18)}
</style>
</head>
<body>
<div id="t">
  <div id="scan"></div><div id="crt"></div>
  <div id="tb">
    <div id="dot"></div>
    <div id="tt">MIRCO / AI ANALYSIS TERMINAL v3.0</div>
    <div id="ck">--:--:--</div>
  </div>
  <div id="sb"><div id="sp"></div><div id="st" style="color:rgba(0,255,136,.4)">BOOTING...</div></div>
  <div id="pb">
    <div id="ps">
      <div id="ptk">$MIRCO / USD</div>
      <div id="pv" style="color:#00ff88">$---</div>
      <div id="pc" style="color:#00ff88">---</div>
      <div id="pm">VOL: ---</div>
    </div>
    <div id="cs"><canvas id="ch" height="80" style="width:100%;display:block"></canvas></div>
    <div id="vd"></div>
  </div>
  <div id="lb"><div class="ln" style="color:rgba(0,255,136,.4)">SYSTEM BOOT...</div><span id="cur">█</span></div>
  <div id="ft">
    <div class="ft">CA: HGNjaczVcV6tKbpWCLa...</div>
    <div class="ft" id="fn">NEXT: --s</div>
  </div>
  <a id="bb" href="https://pump.fun/coin/HGNjaczVcV6tKbpWCLarszbwtwB9hUd2Cd7ySbabpump" target="_blank" rel="noopener">🚀 BUY $MIRCO ON PUMP.FUN</a>
</div>

<script>
var CA='HGNjaczVcV6tKbpWCLarszbwtwB9hUd2Cd7ySbabpump';
var INTERVAL=20000;
var NAMES=['SMA_CROSS','RSI_14','BOLL_BAND','VOL_IDX','MOM_24H'];
var price=0,ch24=0,vol24=0,mkt=0,liq=0,pair='MIRCO/SOL';
var hist=[],lastF=0,cycle=0,busy=false,timers=[];

var $=function(id){return document.getElementById(id);};
var lb=$('lb'),sp=$('sp'),st=$('st'),pv=$('pv'),pc=$('pc'),pm=$('pm'),vd=$('vd'),fn=$('fn'),ck=$('ck'),cv=$('ch');

// ── log ──
function log(txt,col,dim){
  var d=document.createElement('div'); d.className='ln';
  d.textContent=txt;
  d.style.color=dim?'rgba(0,255,136,.22)':(col||'#00ff88');
  lb.insertBefore(d,$('cur'));
  lb.scrollTop=lb.scrollHeight;
}
function clr(){var c=$('cur');while(lb.firstChild&&lb.firstChild!==c)lb.removeChild(lb.firstChild);}
function sc(c,m){st.style.color=c;st.textContent=m;}
function sigC(s){return s==='BUY'?'#00ff88':s==='SELL'?'#ff4488':'#ffcc00';}

// ── format ──
function fmt(n){
  if(!n)return'0';
  if(n<0.000001)return n.toExponential(3);
  if(n<0.0001)return n.toFixed(10);
  if(n<0.001)return n.toFixed(8);
  if(n<1)return n.toFixed(6);
  return n.toFixed(4);
}
function fmtB(n){
  if(!n)return'N/A';
  if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';
  if(n>=1e3)return'$'+(n/1e3).toFixed(1)+'K';
  return'$'+n.toFixed(0);
}
function sma(h,n){var s=h.slice(-n);return s.reduce(function(a,b){return a+b;},0)/s.length;}

// ── chart ──
function draw(){
  var ctx=cv.getContext('2d'),W=cv.offsetWidth||240;cv.width=W;
  var H=80;ctx.clearRect(0,0,W,H);
  var h=hist.slice(-80);if(h.length<2)return;
  var mn=Math.min.apply(null,h),mx=Math.max.apply(null,h),rng=mx-mn||1;
  var up=ch24>=0,col=up?'#00ff88':'#ff4488';
  var pts=h.map(function(v,i){return[(i/(h.length-1))*W,H-((v-mn)/rng)*H*.82-H*.05];});
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,up?'rgba(0,255,136,.2)':'rgba(255,68,136,.2)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.moveTo(pts[0][0],H);
  for(var i=0;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.lineTo(pts[pts.length-1][0],H);ctx.closePath();ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.shadowColor=col;ctx.shadowBlur=6;ctx.stroke();
  var l=pts[pts.length-1];ctx.beginPath();ctx.arc(l[0],l[1],3.5,0,Math.PI*2);
  ctx.fillStyle=col;ctx.shadowBlur=14;ctx.fill();
}

// ── price display ──
function upd(){
  var up=ch24>=0,col=up?'#00ff88':'#ff4488';
  pv.textContent='$'+fmt(price);pv.style.color=col;
  pc.textContent=(up?'▲ +':'▼ ')+ch24.toFixed(2)+'% (24H)';pc.style.color=col;
  pm.textContent='VOL:'+fmtB(vol24)+' MC:'+fmtB(mkt);
}

// ── fetch ──
function doFetch(){
  sp.style.display='block';
  sc('#ffcc00','FETCHING...');
  log('> connecting to dexscreener...','#ffcc00',false);

  // Try dexscreener directly first
  var url='https://api.dexscreener.com/latest/dex/tokens/'+CA;
  log('> GET '+url.slice(0,50)+'...','rgba(0,255,136,.4)',false);

  fetch(url)
    .then(function(res){
      log('> HTTP '+res.status+' '+res.statusText,'rgba(0,255,136,.5)',false);
      if(!res.ok)throw new Error('HTTP '+res.status);
      return res.json();
    })
    .then(function(json){
      log('> response keys: '+Object.keys(json).join(', '),'rgba(0,255,136,.4)',false);
      var pairs=json.pairs||(json.pair?[json.pair]:null);
      if(!pairs||pairs.length===0){
        log('> no pairs found — trying search endpoint...','#ffcc00',false);
        return fetchSearch();
      }
      return processPairs(pairs);
    })
    .catch(function(e){
      log('> error: '+e.message,'#ff4488',false);
      log('> trying search endpoint...','#ffcc00',false);
      fetchSearch();
    });
}

function fetchSearch(){
  var url='https://api.dexscreener.com/latest/dex/search?q=MIRCO';
  log('> GET '+url,'rgba(0,255,136,.4)',false);
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(json){
      log('> search response keys: '+Object.keys(json).join(', '),'rgba(0,255,136,.4)',false);
      var pairs=json.pairs||[];
      // filter by our CA
      var match=pairs.filter(function(p){
        return (p.baseToken&&p.baseToken.address&&p.baseToken.address.toLowerCase()===CA.toLowerCase());
      });
      log('> found '+match.length+' matching pairs','rgba(0,255,136,.5)',false);
      if(match.length===0&&pairs.length>0){
        log('> CA mismatch — using best result','#ffcc00',false);
        return processPairs(pairs.slice(0,3));
      }
      if(match.length>0)return processPairs(match);
      throw new Error('no matching pairs');
    })
    .catch(function(e){
      log('> search failed: '+e.message,'#ff4488',false);
      sp.style.display='none';
      sc('#ff4488','FETCH FAILED — RETRY IN 20s');
    });
}

function processPairs(pairs){
  pairs.sort(function(a,b){return((b.liquidity&&b.liquidity.usd)||0)-((a.liquidity&&a.liquidity.usd)||0);});
  var p=pairs[0];
  log('> pair: '+(p.baseToken&&p.baseToken.symbol)+'/'+((p.quoteToken&&p.quoteToken.symbol)),'rgba(0,255,136,.5)',false);
  log('> chain: '+(p.chainId||'?')+'  dex: '+(p.dexId||'?'),'rgba(0,255,136,.4)',false);

  var np=parseFloat(p.priceUsd)||0;
  log('> priceUsd: '+np,'rgba(0,255,136,.5)',false);
  if(np===0){sc('#ff4488','PRICE IS 0 — NO LIQUIDITY?');log('> price=0, token may have no active trading','#ff4488',false);sp.style.display='none';return;}

  ch24=parseFloat((p.priceChange&&p.priceChange.h24))||0;
  vol24=(p.volume&&p.volume.h24)||0;
  mkt=p.marketCap||p.fdv||0;
  liq=(p.liquidity&&p.liquidity.usd)||0;
  pair=((p.baseToken&&p.baseToken.symbol)||'MIRCO')+'/'+((p.quoteToken&&p.quoteToken.symbol)||'SOL');

  if(price===0&&np>0){
    var sp2=np/(1+ch24/100);hist=[];
    for(var i=0;i<60;i++){var t=i/59,b=sp2+(np-sp2)*t;hist.push(b*(1+(Math.random()-.5)*.012));}
  } else if(np>0){hist.push(np);if(hist.length>120)hist.shift();}
  price=np; lastF=Date.now();

  sp.style.display='none';
  sc('#00ff88','LIVE · '+new Date().toLocaleTimeString('ja-JP'));
  upd(); draw();
  setTimeout(runAnalysis,600);
}

// ── indicators ──
var IND=[
  function(p,h){var s10=sma(h,10),s30=sma(h,30);return s10>s30?{sig:'BUY',reason:'SMA10('+fmt(s10)+')>SMA30('+fmt(s30)+')→Golden cross',score:72}:{sig:'SELL',reason:'SMA10('+fmt(s10)+')<SMA30('+fmt(s30)+')→Death cross',score:35};},
  function(p,h){var g=[],l=[];for(var i=1;i<Math.min(15,h.length);i++){var d=h[h.length-i]-h[h.length-i-1];d>0?g.push(d):l.push(Math.abs(d));}var ag=g.reduce(function(a,b){return a+b;},0)/(g.length||1),al=l.reduce(function(a,b){return a+b;},0)/(l.length||1),r=al===0?100:100-100/(1+ag/al);if(r>70)return{sig:'SELL',reason:'RSI='+r.toFixed(1)+'→Overbought',score:30};if(r<30)return{sig:'BUY',reason:'RSI='+r.toFixed(1)+'→Oversold',score:80};return{sig:'HOLD',reason:'RSI='+r.toFixed(1)+'→Neutral',score:55};},
  function(p,h){var s=h.slice(-20),m=s.reduce(function(a,b){return a+b;},0)/s.length,std=Math.sqrt(s.reduce(function(a,b){return a+(b-m)*(b-m);},0)/s.length),u=m+2*std,lo=m-2*std;if(p>u)return{sig:'SELL',reason:'Above BB upper('+fmt(u)+')',score:28};if(p<lo)return{sig:'BUY',reason:'Below BB lower('+fmt(lo)+')',score:82};return{sig:'HOLD',reason:'BB mid-band',score:52};},
  function(p,h){var v=h.slice(-10).map(function(x,i,a){return i>0?Math.abs(x-a[i-1])/a[i-1]:0;}),vol=v.reduce(function(a,b){return a+b;},0)/v.length*100;if(vol>3)return{sig:'BUY',reason:'Vol surge:'+vol.toFixed(2)+'%→breakout',score:68};return{sig:'HOLD',reason:'Low vol:'+vol.toFixed(2)+'%',score:54};},
  function(p,h){var c=ch24;if(c>20)return{sig:'BUY',reason:'24H:+'+c.toFixed(2)+'%→bull',score:78};if(c>5)return{sig:'BUY',reason:'24H:+'+c.toFixed(2)+'%→momentum',score:65};if(c<-20)return{sig:'SELL',reason:'24H:'+c.toFixed(2)+'%→heavy sell',score:28};if(c<-5)return{sig:'SELL',reason:'24H:'+c.toFixed(2)+'%→bearish',score:38};return{sig:'HOLD',reason:'24H:'+c.toFixed(2)+'%→range',score:50};}
];

// ── analysis ──
function runAnalysis(){
  if(busy||price===0||hist.length<10)return;
  busy=true; timers.forEach(clearTimeout); timers=[];
  cycle++; clr(); vd.style.display='none';
  var res=IND.map(function(f){return f(price,hist);});
  var avg=res.reduce(function(a,b){return a+b.score;},0)/res.length;
  var bv=res.filter(function(r){return r.sig==='BUY';}).length;
  var sv=res.filter(function(r){return r.sig==='SELL';}).length;
  var hv=res.filter(function(r){return r.sig==='HOLD';}).length;
  var fin=bv>=3?'BUY':sv>=3?'SELL':'HOLD';
  var conf=Math.round(avg);
  var bar='';for(var b=0;b<Math.round(conf/10);b++)bar+='█';for(var b=0;b<10-Math.round(conf/10);b++)bar+='░';
  var now=new Date().toLocaleTimeString('ja-JP');

  var lines=[
    {t:0,  s:'──────────────────────────────────────────',d:true},
    {t:80, s:'['+now+'] CYCLE #'+('000'+cycle).slice(-4)},
    {t:220,s:'> PAIR     : '+pair},
    {t:340,s:'> PRICE    : $'+fmt(price)},
    {t:460,s:'> 24H CHG  : '+(ch24>=0?'+':'')+ch24.toFixed(2)+'%'},
    {t:580,s:'> VOLUME   : '+fmtB(vol24)},
    {t:700,s:'> MKT CAP  : '+fmtB(mkt)},
    {t:820,s:'> LIQIDITY : '+fmtB(liq)},
    {t:940,s:'──────────────────────────────────────────',d:true},
    {t:1060,s:'[INDICATOR ENGINE] scanning...'},
  ];
  for(var i=0;i<res.length;i++){
    var base=1240+i*360,r=res[i];
    lines.push({t:base,  s:'  ['+(i+1)+'/5] '+NAMES[i]});
    lines.push({t:base+110,s:'       → '+r.reason});
    lines.push({t:base+210,s:'       → '+r.sig+'  score:'+r.score+'/100',c:sigC(r.sig)});
  }
  lines=lines.concat([
    {t:3100,s:'──────────────────────────────────────────',d:true},
    {t:3250,s:'[CONSENSUS] BUY:'+bv+' HOLD:'+hv+' SELL:'+sv},
    {t:3400,s:'[CONFIDENCE] '+conf+'% '+bar},
    {t:3600,s:'──────────────────────────────────────────',d:true},
    {t:3750,s:'[AI VERDICT] >>> '+fin+' <<<',c:sigC(fin),vv:fin},
    {t:3900,s:fin==='BUY'?'  Accumulation recommended.':fin==='SELL'?'  Risk elevated.':'  Await clearer signal.'},
    {t:4100,s:'[NEXT FETCH] T-'+(INTERVAL/1000)+'s',d:true},
  ]);

  for(var j=0;j<lines.length;j++){
    (function(item){
      var tid=setTimeout(function(){
        log(item.s,item.c,item.d);
        if(item.vv){var vc=sigC(item.vv);vd.textContent=item.vv;vd.style.display='block';vd.style.color=vc;vd.style.border='1px solid '+vc;vd.style.boxShadow='0 0 20px '+vc+'44';}
      },item.t);
      timers.push(tid);
    })(lines[j]);
  }
  setTimeout(function(){busy=false;},4500);
}

// clock + countdown
setInterval(function(){
  ck.textContent=new Date().toLocaleTimeString('ja-JP');
  fn.textContent='NEXT:'+(Math.max(0,Math.round((lastF+INTERVAL-Date.now())/1000)))+'s';
},1000);

// scanline
var spos=0;
(function anim(){spos=(spos+.35)%100;$('scan').style.top=spos+'%';requestAnimationFrame(anim);})();

// boot
doFetch();
setInterval(function(){doFetch();},INTERVAL);
</script>
</body>
</html>
